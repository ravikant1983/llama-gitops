apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama
  template:
    metadata:
      labels:
        app: llama
    spec:
      containers:
      - name: llama
        image: rkg1983/llama:a5d114a2552a648a13254d5943a62e7f934ad6aa
        ports:
        - containerPort: 8080
