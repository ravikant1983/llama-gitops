apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-app
spec:
  strategy:
   type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: llama
  template:
    metadata:
      labels:
        app: llama
    spec:
      containers:
      - name: llama
        image: rkg1983/llama:f91d7a3226eb69cd3fb4eb90a0ca49f189303089
        ports:
        - containerPort: 8080

        resources:
          requests:
            memory: "6Gi"
            cpu: "2"
          limits:
            memory: "12Gi"  # 32GB mein se max 16GB
            cpu: "4"    

            
        volumeMounts:
        - name: model-volume
          mountPath: /models

        command: ["/bin/bash", "-c"]
        args:
          - "/app/llama.cpp/build/bin/llama-server -m /models/ChatWithRavikant.gguf   --host 0.0.0.0  --port 8080  -t 4 --no-mmap -c 4096 --mlock"

      volumes:
      - name: model-volume
        persistentVolumeClaim:
          claimName: llama-model-pvc
